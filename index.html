<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1d2750" />
    <meta
      name="description"
      content="Уберите стрелки — стрелочный пазл: снимайте стрелки, у которых свободный путь до края поля."
    />
    <title>Уберите стрелки</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="screen-home" class="screen home active">
        <div class="home-inner">
          <h1 class="home-logo">Уберите стрелки</h1>
          <p class="home-sub">Стрелочный пазл · снимайте стрелки, чтобы очистить поле</p>
        </div>
        <button type="button" class="btn-primary" id="btn-play">Играть</button>
      </section>

      <section id="screen-game" class="screen">
        <header class="game-top" aria-label="Навигация">
          <button type="button" class="icon-btn" id="btn-back" aria-label="Назад">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6"/>
            </svg>
          </button>
          <div class="game-title">
            <h1 class="headline" id="headline">Уберите стрелки</h1>
            <p class="level-line" id="level-line">Уровень 1</p>
          </div>
          <button type="button" class="icon-btn" id="btn-settings" aria-label="Настройки">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 0 1-4 0v-.08A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 0 1 0-4h.08A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 0 1 4 0v.08c0 .68.39 1.29 1.03 1.56a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.27.64.88 1.03 1.56 1.03H21a2 2 0 0 1 0 4h-.08A1.7 1.7 0 0 0 19.4 15Z"/>
            </svg>
          </button>
        </header>

        <div class="status-row" aria-label="Статус">
          <span class="pill">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path fill="currentColor" d="M21.5 2.5 13 11l-1 6-2-4-4-2 6-1 8.5-8.5Z"/>
            </svg>
            <span id="coins">42</span>
          </span>
          <span class="hearts" id="hearts" aria-label="Жизни"></span>
          <span class="pill" id="diff-pill">Нормальный</span>
        </div>

        <div class="board-wrap">
          <div class="board">
            <div id="grid" class="grid" role="grid" aria-label="Поле"></div>

            <div id="tutorial" class="tutorial" aria-hidden="true">
              <div class="tutorial-hand" id="tutorial-hand">
                <svg viewBox="0 0 64 64" width="54" height="54" aria-hidden="true">
                  <path fill="#fff" stroke="#0f1a3a" stroke-width="1.5" stroke-linejoin="round"
                    d="M27 8c-2.2 0-4 1.8-4 4v18l-3.6-3.2c-1.7-1.5-4.3-1.3-5.7.4-1.4 1.7-1.2 4.3.5 5.7L23 42v2c0 7.2 5.8 13 13 13h3c7.2 0 13-5.8 13-13V29c0-2.2-1.8-4-4-4s-4 1.8-4 4v6c0-2.2-1.8-4-4-4s-4 1.8-4 4v2c0-2.2-1.8-4-4-4s-4 1.8-4 4V12c0-2.2-1.8-4-4-4Z"/>
                </svg>
              </div>
              <div class="tutorial-tip" id="tutorial-tip">Коснитесь, чтобы удалить</div>
            </div>
          </div>
        </div>

        <p class="toast" id="toast" role="status"></p>

        <div class="bottom-bar" role="toolbar" aria-label="Инструменты">
          <button type="button" class="fab" id="btn-hint" aria-label="Подсказка">
            <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M9 18h6M10 21h4M12 3a7 7 0 0 1 4 12.7c-.6.5-1 1.3-1 2.1V18H9v-.2c0-.8-.4-1.6-1-2.1A7 7 0 0 1 12 3Z"/>
            </svg>
            <span class="fab-badge" id="hint-badge">2</span>
          </button>
          <button type="button" class="fab" id="btn-levels" aria-label="Сменить уровень" title="Следующий уровень">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/>
            </svg>
          </button>
        </div>
      </section>
    </div>

    <div id="confetti" class="confetti" aria-hidden="true"></div>

    <div id="modal-win" class="modal-backdrop win-backdrop" role="dialog" aria-modal="true" aria-labelledby="win-title">
      <div class="win-rays" aria-hidden="true"></div>
      <div class="win-content">
        <h2 id="win-title">Уровень пройден!</h2>
        <div class="win-card" id="win-card" aria-hidden="true"></div>
        <div class="win-actions">
          <button type="button" class="btn-primary win-next" id="btn-win-next">
            <span class="win-next-title">Следующая игра</span>
            <span class="win-next-sub" id="win-next-sub">Уровень 2</span>
          </button>
          <button type="button" class="btn-ghost" id="btn-win-home">Главная</button>
        </div>
      </div>
    </div>

    <div id="modal-lose" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="lose-title">
      <div class="modal">
        <h2 id="lose-title">Жизни закончились</h2>
        <p>Попробуйте другой порядок ходов или воспользуйтесь подсказкой.</p>
        <div class="modal-actions">
          <button type="button" class="btn-primary" id="btn-lose-restart">Заново</button>
          <button type="button" class="btn-secondary" id="btn-lose-home">На главную</button>
        </div>
      </div>
    </div>

    <div id="modal-settings" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="set-title">
      <div class="modal settings-panel">
        <h2 id="set-title">Настройки</h2>
        <label>
          <input type="checkbox" id="chk-highlight" checked />
          Подсвечивать стрелки со свободным путём
        </label>
        <label>
          <input type="checkbox" id="chk-tutorial" />
          Повторить обучение
        </label>
        <div class="modal-actions" style="margin-top: 8px">
          <button type="button" class="btn-primary" id="btn-settings-save">Готово</button>
          <button type="button" class="btn-secondary" id="btn-settings-close">Отмена</button>
        </div>
      </div>
    </div>

    <script src="js/levels.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
